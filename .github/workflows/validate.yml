name: Validate ACG Core

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Run ACG enforcement
        run: python scripts/acg-enforce.py --config acg.yaml --mode all

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acg-evidence
          path: |
            acg-evidence.jsonl
            acg-logs/
